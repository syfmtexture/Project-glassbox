name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./Glassbox
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: ./Glassbox/package-lock.json
        
    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint
      
    - name: Run Tests
      run: npm run test -- --run
      
    - name: Build Project
      run: npm run build
